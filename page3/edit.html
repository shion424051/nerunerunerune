<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Scale | 編集</title>
  <link rel="stylesheet" href="edit.css">
</head>
<body class="page-edit">
  <main class="edit-stage">
    <header class="simple-top">
      <a class="back-link" href="../page2/main.html" aria-label="戻る">‹</a>
      <a class="outline-button edit-label" href="../page2/main.html">編集</a>
    </header>

    <section class="edit-tools" aria-label="編集ツール">
      <form class="inline-add-form" data-member-add-form>
        <input name="memberName" type="text" placeholder="メンバー名を追加" required>
        <button type="submit">追加</button>
      </form>
      <p>メンバーごとの枠にタスク名と時間を入れて追加できます。</p>
    </section>

    <section id="editMemberList" class="edit-member-list" aria-label="タスク編集"></section>
  </main>

  <script src="edit.js"></script>
</body>
</html>
